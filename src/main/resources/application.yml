spring:
  application:
    name: your-microworld
  config:
    import: optional:file:./config/application-local.yml
  profiles:
    default: mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:your_microworld}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:your-microworld-development-secret-key-change-before-production}
    expiration-minutes: 120
